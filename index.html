<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Etch-a-sketch</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Etch-a-sketch</h1>
    <div class="outer-container">
        <div class="sidebar">
            <div>
                <button class="binary">Binary mode</button>
            </div>
            <div>
                <button class="rainbow">Rainbow mode</button>
            </div>
            <div>
                <button class="gradient">Gradient mode</button>
            </div>
            <div>
                <button class="clear">Clear</button>
            </div>
        </div>
        <div class="container"></div>
        <div class="place-holder">
            <button class="setting">Setting</button>
        </div>
    </div>
</body>
</html>
